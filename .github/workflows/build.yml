name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add icon files
        run: |
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26

          echo '<?xml version="1.0" encoding="utf-8"?><layer-list xmlns:android="http://schemas.android.com/apk/res/android"><item><color android:color="#07101D"/></item></layer-list>' > app/src/main/res/drawable/splash.xml
          echo '<?xml version="1.0" encoding="utf-8"?><layer-list xmlns:android="http://schemas.android.com/apk/res/android"><item><color android:color="#07101D"/></item></layer-list>' > app/src/main/res/drawable/ic_notification_icon.xml
          echo '<?xml version="1.0" encoding="utf-8"?><layer-list xmlns:android="http://schemas.android.com/apk/res/android"><item><color android:color="#07101D"/></item></layer-list>' > app/src/main/res/drawable/shortcut_0.xml
          echo '<?xml version="1.0" encoding="utf-8"?><layer-list xmlns:android="http://schemas.android.com/apk/res/android"><item><color android:color="#07101D"/></item></layer-list>' > app/src/main/res/drawable/shortcut_1.xml
          echo '<?xml version="1.0" encoding="utf-8"?><layer-list xmlns:android="http://schemas.android.com/apk/res/android"><item><color android:color="#07101D"/></item></layer-list>' > app/src/main/res/mipmap-anydpi-v26/ic_maskable.xml

          sed -i 's|@drawable/splash|@color/colorPrimary|g' app/src/main/AndroidManifest.xml
          sed -i 's|@drawable/ic_notification_icon|@mipmap/ic_launcher|g' app/src/main/AndroidManifest.xml
          sed -i 's|@drawable/shortcut_0|@mipmap/ic_launcher|g' app/src/main/res/xml/shortcuts.xml || true
          sed -i 's|@drawable/shortcut_1|@mipmap/ic_launcher|g' app/src/main/res/xml/shortcuts.xml || true
          sed -i 's|@drawable/ic_maskable|@mipmap/ic_launcher|g' app/src/main/AndroidManifest.xml || true

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --max-workers=2
        env:
          JAVA_TOOL_OPTIONS: "-Xmx1g"

      - name: Sign APK
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks android.keystore \
            --ks-key-alias Destro \
            --ks-pass pass:Qibla2025! \
            --key-pass pass:Qibla2025! \
            --out app-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: qibla-apk
          path: |
            app-signed.apk
            app/build/outputs/bundle/release/*.aab
