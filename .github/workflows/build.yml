name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add icon files
        run: |
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26

          # Use real PNG icons from repo
          cp icon-512.png app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp icon-512.png app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp icon-512.png app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp icon-512.png app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp icon-512.png app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          # Fix manifest references
          sed -i 's|@drawable/splash|@mipmap/ic_launcher|g' app/src/main/AndroidManifest.xml
          sed -i 's|@drawable/ic_notification_icon|@mipmap/ic_launcher|g' app/src/main/AndroidManifest.xml
          sed -i 's|@drawable/ic_maskable|@mipmap/ic_launcher|g' app/src/main/AndroidManifest.xml || true
          sed -i 's|@drawable/shortcut_0|@mipmap/ic_launcher|g' app/src/main/res/xml/shortcuts.xml || true
          sed -i 's|@drawable/shortcut_1|@mipmap/ic_launcher|g' app/src/main/res/xml/shortcuts.xml || true

          # Remove broken drawable XMLs if they exist
          rm -f app/src/main/res/drawable/splash.xml
          rm -f app/src/main/res/drawable/ic_notification_icon.xml
          rm -f app/src/main/res/drawable/shortcut_0.xml
          rm -f app/src/main/res/drawable/shortcut_1.xml
          rm -f app/src/main/res/mipmap-anydpi-v26/ic_maskable.xml

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --max-workers=2
        env:
          JAVA_TOOL_OPTIONS: "-Xmx1g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: qibla-apk
          path: app/build/outputs/apk/debug/app-debug.apk
